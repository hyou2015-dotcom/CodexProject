<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Tetris</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="game-panel">
        <h1>テトリス</h1>
        <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>
        <div class="mobile-controls" aria-label="スマホ操作ボタン">
          <button id="leftBtn" type="button">←</button>
          <button id="rotateBtn" type="button">⟳</button>
          <button id="rightBtn" type="button">→</button>
          <button id="downBtn" type="button">↓</button>
          <button id="dropBtn" type="button">DROP</button>
          <button id="pauseBtn" type="button">P</button>
        </div>
      </section>
      <aside class="info-panel">
        <div class="card">
          <h2>スコア</h2>
          <p id="score">0</p>
        </div>
        <div class="card">
          <h2>レベル</h2>
          <p id="level">1</p>
        </div>
        <div class="card speed-card">
          <h2>落下速度</h2>
          <label class="speed-control" for="speedRange">
            <span id="speedLabel">1.0x</span>
            <input id="speedRange" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
          </label>
        </div>
        <div class="card">
          <h2>操作方法</h2>
          <ul>
            <li>← / → : 移動</li>
            <li>↑ : 回転</li>
            <li>↓ : ソフトドロップ</li>
            <li>スペース : ハードドロップ</li>
            <li>P : 一時停止</li>
            <li>スマホ: 画面下の操作ボタン</li>
          </ul>
        </div>
        <button id="startBtn" type="button">ゲーム開始 / リスタート</button>
        <p id="status" aria-live="polite">ボタンを押して開始</p>
      </aside>
    </main>

    <script src="tetris.js"></script>
  </body>
</html>
